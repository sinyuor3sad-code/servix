name: 🐛 Bug report
description: Something is broken or behaves unexpectedly
labels: [bug, triage]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - api
        - dashboard
        - booking
        - admin
        - infra / deployment
        - database / migrations
        - payments
        - auth / security
        - other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 — production outage / data loss / payment failure
        - P2 — major feature broken, no workaround
        - P3 — minor issue, workaround exists
        - P4 — cosmetic / nice-to-fix
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: 'production / staging / local; tenant id; commit sha'

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / error IDs
      render: shell
