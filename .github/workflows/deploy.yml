name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/servix-api:${{ github.sha }},${{ secrets.REGISTRY_URL }}/servix-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/servix-dashboard:${{ github.sha }},${{ secrets.REGISTRY_URL }}/servix-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Booking
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/booking/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/servix-booking:${{ github.sha }},${{ secrets.REGISTRY_URL }}/servix-booking:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_URL }}/servix-admin:${{ github.sha }},${{ secrets.REGISTRY_URL }}/servix-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/servix
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
