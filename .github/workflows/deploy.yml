name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_staging:
        description: 'Skip staging gate (emergency hotfix only)'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════
  # Quality Gate — must pass before any image is pushed
  # ═══════════════════════════════════════════
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma clients
        run: pnpm --filter @servix/api db:generate
      - name: Type check (API)
        run: pnpm --filter @servix/api type-check
      - name: Lint
        run: pnpm lint
      - name: Test (API)
        # pnpm's `--` forwarding lands after jest's own `--` delimiter, which
        # treats our flags as test-name patterns. Run jest directly instead.
        run: cd apps/api && npx jest --passWithNoTests --forceExit
        env:
          NODE_ENV: test
      - name: Audit (high+critical)
        run: pnpm audit --prod --audit-level=high

  # ═══════════════════════════════════════════
  # Build → Scan → Push (per app, in parallel)
  # ═══════════════════════════════════════════
  build:
    name: Build & Scan ${{ matrix.app }}
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [api, dashboard, booking, admin]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Image metadata
        id: meta
        run: |
          echo "tag=${{ secrets.REGISTRY_URL }}/servix-${{ matrix.app }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=${{ secrets.REGISTRY_URL }}/servix-${{ matrix.app }}:latest" >> "$GITHUB_OUTPUT"

      # Build to local docker so we can scan before pushing.
      - name: Build (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          load: true
          tags: ${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.tag }}
          format: cyclonedx
          output: sbom-${{ matrix.app }}.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.app }}-${{ github.sha }}
          path: sbom-${{ matrix.app }}.cdx.json
          retention-days: 90

      # Only push if the Trivy gate passed.
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha,scope=${{ matrix.app }}

  # ═══════════════════════════════════════════
  # Staging — smoke test before production
  # ═══════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: ${{ !inputs.skip_staging }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Pull + restart staging stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/servix/tooling/docker
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans

      - name: Smoke test staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            sleep 30
            for i in 1 2 3 4 5; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4100/api/v1/health/ready || echo 000)
              [ "$CODE" = "200" ] && { echo "✅ staging healthy"; exit 0; }
              echo "Staging not ready (HTTP $CODE), retry $i/5"; sleep 10
            done
            echo "❌ staging failed health check"; exit 1

  # ═══════════════════════════════════════════
  # Production — gated by staging
  # ═══════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-staging]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.deploy-staging.result == 'success' || inputs.skip_staging)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Pre-deploy DB backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/servix
            bash tooling/scripts/backup.sh || { echo "❌ Backup failed — aborting deploy"; exit 1; }

      - name: Capture currently-running image tags (for rollback)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/servix/tooling/docker
            docker compose -f docker-compose.prod.yml config --images > /tmp/servix-prev-images.txt
            cat /tmp/servix-prev-images.txt

      - name: Rolling deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/servix/tooling/docker
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull

            # Roll API replicas one at a time
            for replica in api-1 api-2; do
              echo "🔄 Restarting $replica"
              docker compose -f docker-compose.prod.yml up -d --no-deps "$replica"
              sleep 20
              CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/v1/health/live || echo 000)
              [ "$CODE" = "200" ] || { echo "❌ $replica failed health check (HTTP $CODE)"; exit 1; }
              echo "✅ $replica healthy"
            done

            # Front-ends + workers
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f --filter "until=168h"

      - name: Verify full stack
        id: verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            sleep 30
            FAILED=0
            check() {
              local name=$1 url=$2
              local code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo 000)
              if [ "$code" = "200" ]; then echo "✅ $name OK ($code)"
              else echo "❌ $name FAIL ($code)"; FAILED=1; fi
            }
            check api-1 http://localhost:4000/api/v1/health/ready
            check dashboard http://localhost:3000/
            check booking http://localhost:3001/
            check admin http://localhost:3002/
            exit $FAILED

      - name: Rollback on failure
        if: failure() && steps.verify.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚨 Rolling back to previous images"
            cd /root/servix/tooling/docker
            while read -r img; do docker pull "$img" || true; done < /tmp/servix-prev-images.txt
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sleep 20
            curl -fsS http://localhost:4000/api/v1/health/live && echo "✅ rollback healthy"

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            { "text": "🚨 Production deploy of `${{ github.sha }}` FAILED — rollback executed. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>" }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            { "text": "✅ Production deploy of `${{ github.sha }}` succeeded." }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
