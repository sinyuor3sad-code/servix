name: PR Quality

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  # Enforce conventional commit format on the PR title.
  # The squash-merge commit uses the PR title, so this is what ends up in
  # `git log` on main and what feeds the changelog/release-notes generator.
  semantic-title:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
            security
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must start lowercase, not end with a period.
            Examples:
              feat(booking): support Mada wallets
              fix(api): retry failed Moyasar webhooks
              security(auth): rotate refresh tokens on logout

  # Block PRs that introduce a high-severity new dep without review.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Auto-label PRs by changed paths (best-effort; doesn't fail).
  labeler:
    name: Path labeler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
        continue-on-error: true
