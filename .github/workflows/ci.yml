name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Clients
        run: pnpm --filter @servix/api db:generate
      - name: Lint
        run: pnpm lint
      - name: Type Check API
        run: pnpm --filter @servix/api type-check
      - name: Type Check Dashboard
        run: pnpm --filter @servix/dashboard type-check
      - name: Type Check Booking
        run: pnpm --filter @servix/booking type-check
      - name: Type Check Admin
        run: pnpm --filter @servix/admin type-check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: npm audit (high + critical)
        # Fail the build on high/critical vulnerabilities. Use `pnpm audit
        # --fix` locally or pin the dep before merging.
        run: pnpm audit --audit-level=high

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/typescript
            p/nodejs
            p/owasp-top-ten
        env:
          # Fail on findings of severity ERROR; warnings only post to summary.
          SEMGREP_FAIL_OPEN: 'false'

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Clients
        run: pnpm --filter @servix/api db:generate

      - name: Run Unit Tests with Coverage
        run: pnpm --filter @servix/api test -- --coverage --passWithNoTests --coverageReporters=json-summary --coverageReporters=text

      - name: Coverage Gate (90% minimum)
        run: |
          COVERAGE=$(node -e "
            const report = require('./apps/api/coverage/coverage-summary.json');
            const total = report.total;
            const avg = (total.lines.pct + total.branches.pct + total.functions.pct + total.statements.pct) / 4;
            console.log(avg.toFixed(2));
          ")
          echo "Coverage: ${COVERAGE}%"
          node -e "if (parseFloat('${COVERAGE}') < 90) { console.error('❌ Coverage ${COVERAGE}% is below 90% threshold'); process.exit(1); } else { console.log('✅ Coverage ${COVERAGE}% meets 90% threshold'); }"

      - name: Dashboard unit tests with coverage
        run: pnpm --filter @servix/dashboard vitest run --coverage --reporter=verbose

      - name: Consumer Contract Tests (Pact)
        run: pnpm --filter @servix/dashboard test:pact

      - name: Provider Contract Verification (Pact)
        run: pnpm --filter @servix/api test:pact:verify

      - name: Chaos Engineering (graceful degradation)
        # Pure unit tests with mocked Redis/providers — no services needed.
        # Catches regressions where someone removes a try/catch and turns a
        # downstream blip into a platform outage. See tooling/chaos/scenarios.md
        run: pnpm --filter @servix/api test:chaos

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        app: [api, dashboard, booking, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma (API only)
        if: matrix.app == 'api'
        run: pnpm --filter @servix/api db:generate
      - name: Build ${{ matrix.app }}
        run: pnpm --filter @servix/${{ matrix.app }} build

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: servix
          POSTGRES_PASSWORD: servix
          POSTGRES_DB: servix_platform
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      # API uses PLATFORM_DATABASE_URL (per platform.prisma datasource).
      # DATABASE_URL kept as alias for any tooling that still reads it.
      PLATFORM_DATABASE_URL: postgresql://servix:servix@localhost:5432/servix_platform
      DATABASE_URL: postgresql://servix:servix@localhost:5432/servix_platform
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-32-chars-minimum-ok
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars-x
      TEST_EMAIL: servix@dev.local
      TEST_PASSWORD: adsf1324
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma Clients
        run: pnpm --filter @servix/api db:generate
      - name: Apply platform migrations
        run: pnpm --filter @servix/api exec prisma migrate deploy --schema=prisma/platform.prisma
      - name: Seed E2E fixtures (platform + tenant DB + salon data)
        run: pnpm --filter @servix/api db:seed:e2e
      - name: Install Playwright browsers
        run: pnpm --filter @servix/dashboard e2e:install
      - name: Build API + Dashboard
        run: |
          pnpm --filter @servix/api build
          pnpm --filter @servix/dashboard build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Start API (background)
        run: pnpm --filter @servix/api start > /tmp/api.log 2>&1 &
        env:
          PORT: 4000
      - name: Start Dashboard (background)
        run: pnpm --filter @servix/dashboard start > /tmp/dashboard.log 2>&1 &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Wait for services
        run: npx wait-on --timeout 120000 http://localhost:4000/api/v1/health/live http://localhost:3000
      - name: Run E2E tests
        run: pnpm --filter @servix/dashboard e2e
        env:
          CI: '1'
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== API LOG ==="; tail -200 /tmp/api.log || true
          echo "=== DASHBOARD LOG ==="; tail -200 /tmp/dashboard.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/dashboard/test-results/

  performance:
    name: Performance Budget (Lighthouse)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Dashboard
        run: pnpm --filter @servix/dashboard build
      - name: Lighthouse CI
        # Performance budget is enforced via apps/dashboard/lighthouserc.* —
        # if a regression breaches the budget, fail the PR.
        run: cd apps/dashboard && npx lhci autorun
      - name: Bundle Size Check
        run: |
          cd apps/dashboard
          TOTAL_KB=$(du -sk .next/static/chunks 2>/dev/null | cut -f1)
          echo "📦 JS Bundle Size: ${TOTAL_KB:-0}KB"
          if [ "${TOTAL_KB:-0}" -gt 400 ]; then
            echo "::error::Bundle size ${TOTAL_KB}KB exceeds 400KB budget!"
            exit 1
          fi
          echo "✅ Bundle within 400KB budget"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: apps/dashboard/lhci-results/

  # Deployment lives in .github/workflows/deploy.yml (GHCR-image based,
  # with Trivy scan + health verification + rollback). Keeping a single
  # deploy path avoids racing two workflows on every push to main.
