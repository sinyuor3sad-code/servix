global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'servix-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-1:4000', 'api-2:4000']
        labels:
          app: 'servix'
          service: 'api'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          app: 'servix'
          service: 'node'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          app: 'servix'
          service: 'postgres'
