# ═══════════════════════════════════════════════════════════════
# SERVIX PostgreSQL configuration
#
# Mounted into /etc/postgresql/postgresql.conf in docker-compose.prod.yml
# and loaded via:
#   command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
#
# Key purpose: enable WAL archiving so we can do Point-In-Time Recovery
# (PITR) and bring RPO down from 6h (logical-dump cadence) to ~1 minute
# (the longest a WAL segment may sit before being archived).
# ═══════════════════════════════════════════════════════════════

# ── Connection / auth ──
listen_addresses        = '*'
max_connections         = 200
password_encryption     = scram-sha-256

# ── Memory (tune for 4GB+ host; adjust for your server) ──
shared_buffers          = 1GB
effective_cache_size    = 3GB
work_mem                = 16MB
maintenance_work_mem    = 256MB

# ── WAL + archiving (REQUIRED for PITR) ────────────────────────
wal_level               = replica            # enough for archiving + replicas
archive_mode            = on
# Ship every completed WAL segment to MinIO via mc.
# %p = full path of segment to archive, %f = basename.
# Returns 0 on success — postgres will retry forever on failure
# (that's intentional; better to back-pressure than to lose WAL).
archive_command         = '/scripts/archive-wal.sh "%p" "%f"'
archive_timeout         = 60                 # force a segment switch every 60s
                                             # → worst-case RPO ≈ 60s
max_wal_size            = 2GB
min_wal_size            = 256MB
wal_compression         = on
wal_keep_size           = 1GB                # streaming-replication safety net

# ── Query log (slow queries for the API perf dashboard) ──
log_min_duration_statement = 500             # log queries >500ms
log_line_prefix         = '%m [%p] %u@%d '
log_lock_waits          = on
log_temp_files          = 0
log_checkpoints         = on
log_connections         = off
log_disconnections      = off

# ── Statistics (enables pg_stat_statements view) ──
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
track_io_timing          = on

# ── Autovacuum (keep aggressive for SaaS write patterns) ──
autovacuum                                   = on
autovacuum_max_workers                       = 4
autovacuum_naptime                           = 30s
autovacuum_vacuum_scale_factor               = 0.05
autovacuum_analyze_scale_factor              = 0.025

# ── Checkpoint tuning ──
checkpoint_completion_target = 0.9
checkpoint_timeout          = 15min

# ── Locale ──
timezone                = 'UTC'
log_timezone            = 'UTC'
datestyle               = 'iso, mdy'
default_text_search_config = 'pg_catalog.english'
