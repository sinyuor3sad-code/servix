worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # ── Access Logging (JSON structured) ──
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"server_name":"$server_name",'
            '"correlation_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── Docker embedded DNS ──
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Single API upstream (no load balancing needed) ──
    upstream api_backend {
        server api:4000;
    }

    # ── Rate Limiting Zones ──
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=web_general:10m rate=20r/s;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── SSL Hardening ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers (global) ──
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request Limits ──
    client_max_body_size 10m;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Hide nginx version
    server_tokens off;

    # ── Common proxy headers (reusable) ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ══════════ HTTP → HTTPS redirect ══════════
    server {
        listen 80;
        server_name api.servi-x.com app.servi-x.com booking.servi-x.com admin.servi-x.com servi-x.com www.servi-x.com;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # www → non-www redirect
    server {
        listen 443 ssl;
        server_name www.servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        return 301 https://servi-x.com$request_uri;
    }

    # ══════════ API ══════════
    server {
        listen 443 ssl;
        server_name api.servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Auth endpoints — strict rate limit
        location ~ ^/api/v1/auth/(login|register|refresh|forgot-password|verify-otp|send-otp) {
            limit_req zone=api_auth burst=3 nodelay;
            add_header Cache-Control "no-store, no-cache" always;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $request_id;
        }

        # Prometheus metrics — internal only
        location /metrics {
            # Only allow from internal Docker network and localhost
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "no-store" always;
        }

        # WhatsApp Webhook
        location /api/v1/webhooks/whatsapp {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $request_id;
            client_max_body_size 20M;
            add_header Cache-Control "no-store" always;
        }

        # Block access to sensitive paths
        location ~ ^/(\.env|\.git|docker-compose|Dockerfile) {
            return 404;
        }

        # General API
        location / {
            limit_req zone=api_general burst=50 nodelay;
            add_header Cache-Control "no-store, no-cache" always;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $request_id;
        }

        # WebSocket
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ══════════ Dashboard ══════════
    server {
        listen 443 ssl;
        server_name app.servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        set $dashboard_upstream http://dashboard:3000;

        # Static assets — long cache
        location /_next/static/ {
            proxy_pass $dashboard_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location /images/ {
            proxy_pass $dashboard_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=604800" always;
        }

        location /fonts/ {
            proxy_pass $dashboard_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            limit_req zone=web_general burst=40 nodelay;
            proxy_pass $dashboard_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════ Booking ══════════
    server {
        listen 443 ssl;
        server_name booking.servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        set $booking_upstream http://booking:3001;

        location /_next/static/ {
            proxy_pass $booking_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            limit_req zone=web_general burst=40 nodelay;
            proxy_pass $booking_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════ Admin ══════════
    server {
        listen 443 ssl;
        server_name admin.servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        set $admin_upstream http://admin:3002;

        location /_next/static/ {
            proxy_pass $admin_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            limit_req zone=web_general burst=40 nodelay;
            proxy_pass $admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════ Landing ══════════
    server {
        listen 443 ssl;
        server_name servi-x.com;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        set $landing_upstream http://landing:3003;

        location /_next/static/ {
            proxy_pass $landing_upstream;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        location / {
            limit_req zone=web_general burst=40 nodelay;
            proxy_pass $landing_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════ Stub status (Prometheus) ══════════
    server {
        listen 8080;
        server_name localhost;
        location /stub_status {
            stub_status;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
        }
    }
}
