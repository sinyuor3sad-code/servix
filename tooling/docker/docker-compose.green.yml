# ═══════════════════════════════════════════════════════════
# SERVIX Green Environment — Blue-Green Deployment
# Only API instances. Shared infra runs in docker-compose.prod.yml
# ═══════════════════════════════════════════════════════════

services:
  api-green-1:
    image: servix-api:${VERSION:-latest}
    container_name: servix-api-green-1
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      PORT: 4000
      INSTANCE_ID: green-1
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - servix-network

  api-green-2:
    image: servix-api:${VERSION:-latest}
    container_name: servix-api-green-2
    restart: unless-stopped
    env_file: ../../.env.production
    environment:
      PORT: 4000
      INSTANCE_ID: green-2
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - servix-network

networks:
  servix-network:
    external: true
    name: servix-network
