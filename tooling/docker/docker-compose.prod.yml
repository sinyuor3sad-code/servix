services:
  # ═══════ Infrastructure ═══════
  postgres:
    image: postgres:17-alpine
    container_name: servix-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-servix_platform}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ../postgres/archive-wal.sh:/scripts/archive-wal.sh:ro
    # archive_command needs `mc` + `gpg` inside the postgres container.
    # Install once on container start; subsequent restarts re-install
    # (alpine images are stateless, so packages live in the image layer).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        apk add --no-cache curl gnupg >/dev/null 2>&1 &&
        (command -v mc >/dev/null 2>&1 || (curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc /scripts/archive-wal.sh)) &&
        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servix-network

  redis:
    image: redis:8-alpine
    container_name: servix-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servix-network

  minio:
    image: minio/minio:latest
    container_name: servix-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - servix-network

  # ═══════ PgBouncer Connection Pooler ═══════
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: servix-pgbouncer
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-servix_platform}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 50
      MAX_CLIENT_CONN: 300
      MAX_DB_CONNECTIONS: 150
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 300
      QUERY_TIMEOUT: 30
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5432"
    networks:
      - servix-network

  # ═══════ Secrets Management (5.4) ═══════
  vault:
    image: hashicorp/vault:1.15
    container_name: servix-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - vault_data:/vault/file
    restart: unless-stopped
    networks:
      - servix-network

  # ═══════ Distributed Tracing (6.4) ═══════
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: servix-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_data:/badger
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:4318:4318"    # OTLP HTTP receiver
    restart: unless-stopped
    networks:
      - servix-network

  # ═══════ Read Replica (4.3) ═══════
  postgres-replica:
    image: bitnami/postgresql:17
    container_name: servix-postgres-replica
    restart: always
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      POSTGRESQL_MASTER_HOST: postgres
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servix-network

  # ═══════ Application Services (4.1 — 2 instances) ═══════
  api-1:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: servix-api-1
    restart: always
    stop_grace_period: 35s
    environment:
      NODE_ENV: production
      PORT: 4000
      INSTANCE_ID: api-1
      PLATFORM_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-servix_platform}
      DATABASE_READ_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-servix_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.servi-x.com,https://booking.servi-x.com,https://admin.servi-x.com,https://servi-x.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_AI_TOKEN: ${CLOUDFLARE_AI_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WHATSAPP_REGISTRATION_PIN: ${WHATSAPP_REGISTRATION_PIN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - servix-network

  api-2:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: servix-api-2
    restart: always
    stop_grace_period: 35s
    environment:
      NODE_ENV: production
      PORT: 4000
      INSTANCE_ID: api-2
      PLATFORM_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-servix_platform}
      DATABASE_READ_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-servix_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.servi-x.com,https://booking.servi-x.com,https://admin.servi-x.com,https://servi-x.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_AI_TOKEN: ${CLOUDFLARE_AI_TOKEN:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WHATSAPP_REGISTRATION_PIN: ${WHATSAPP_REGISTRATION_PIN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - servix-network

  dashboard:
    build:
      context: ../../
      dockerfile: apps/dashboard/Dockerfile
    container_name: servix-dashboard
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.servi-x.com/api/v1}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-https://api.servi-x.com}
      NEXT_PUBLIC_DASHBOARD_URL: https://app.servi-x.com
      NEXT_PUBLIC_META_APP_ID: ${META_APP_ID:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    depends_on:
      api-1:
        condition: service_healthy
    networks:
      - servix-network

  booking:
    build:
      context: ../../
      dockerfile: apps/booking/Dockerfile
    container_name: servix-booking
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.servi-x.com/api/v1}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    depends_on:
      api-1:
        condition: service_healthy
    networks:
      - servix-network

  admin:
    build:
      context: ../../
      dockerfile: apps/admin/Dockerfile
    container_name: servix-admin
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.servi-x.com/api/v1}
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/login"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    depends_on:
      - api-1
    networks:
      - servix-network

  landing:
    build:
      context: ../../
      dockerfile: apps/landing/Dockerfile
    container_name: servix-landing
    restart: always
    environment:
      NEXT_PUBLIC_DASHBOARD_URL: https://app.servi-x.com
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3003/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    networks:
      - servix-network

  # ═══════ Nginx Reverse Proxy ═══════
  nginx:
    image: nginx:alpine
    container_name: servix-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-1
      - api-2
      - dashboard
      - booking
      - admin
    networks:
      - servix-network

  # ═══════ Automated Backup ═══════
  # Cron-driven inside the container:
  #   - every 6h:    logical dump → encrypt → MinIO (servix-backups)
  #   - daily 02:00: mirror latest day to off-site S3 (3-2-1 rule)
  #   - weekly Sun 04:00: restore latest backup to ephemeral DB and validate
  # Backup-freshness timestamp is written to a textfile collector that
  # node-exporter scrapes, so Prometheus alerts fire if backups go stale.
  backup:
    image: postgres:17-alpine
    container_name: servix-backup
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGPORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Encryption — required. Backup script refuses to run without this.
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE}
      # Off-site mirror (e.g., Backblaze B2 / Wasabi / AWS S3).
      OFFSITE_S3_ENDPOINT: ${OFFSITE_S3_ENDPOINT:-}
      OFFSITE_S3_BUCKET: ${OFFSITE_S3_BUCKET:-}
      OFFSITE_S3_ACCESS_KEY: ${OFFSITE_S3_ACCESS_KEY:-}
      OFFSITE_S3_SECRET_KEY: ${OFFSITE_S3_SECRET_KEY:-}
      OFFSITE_S3_REGION: ${OFFSITE_S3_REGION:-us-east-1}
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - ./scripts/restore.sh:/scripts/restore.sh:ro
      - ../scripts/verify-backup.sh:/scripts/verify-backup.sh:ro
      - ../scripts/mirror-to-offsite.sh:/scripts/mirror-to-offsite.sh:ro
      - ../scripts/base-backup.sh:/scripts/base-backup.sh:ro
      - backup_data:/backups
      - node_exporter_textfile:/var/lib/node_exporter/textfile_collector
      # verify-backup.sh needs to launch a sibling postgres container
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command: >
      -c "apk add --no-cache curl gnupg docker-cli >/dev/null 2>&1 &&
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc &&
          chmod +x /usr/local/bin/mc &&
          mkdir -p /var/lib/node_exporter/textfile_collector &&
          {
            echo '0 */6 * * * /bin/sh /scripts/backup.sh             >> /backups/cron.log 2>&1';
            echo '0 2   * * * /bin/sh /scripts/mirror-to-offsite.sh  >> /backups/mirror.log 2>&1';
            echo '0 4   * * 0 /bin/sh /scripts/verify-backup.sh      >> /backups/verify.log 2>&1';
            echo '0 5   * * 0 /bin/sh /scripts/base-backup.sh        >> /backups/base.log 2>&1';
          } > /etc/crontabs/root &&
          echo 'Backup cron scheduled: dump@6h, mirror@daily 02:00, verify+base@Sun 04:00/05:00' &&
          /bin/sh /scripts/backup.sh || true ;
          crond -f -l 2"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - servix-network

  # ═══════ Monitoring Stack ═══════
  prometheus:
    image: prom/prometheus:latest
    container_name: servix-prometheus
    restart: always
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=5GB'
      - '--web.enable-lifecycle'
    depends_on:
      api-1:
        condition: service_healthy
      alertmanager:
        condition: service_started
    networks:
      - servix-network

  # Renders alertmanager.yml.tmpl → alertmanager.yml with env vars expanded.
  # Runs once and exits; alertmanager mounts the rendered file from the same volume.
  alertmanager-config:
    image: alpine:3.19
    container_name: servix-alertmanager-config
    environment:
      ALERT_SLACK_WEBHOOK_URL: ${ALERT_SLACK_WEBHOOK_URL:-}
      ALERT_PAGERDUTY_ROUTING_KEY: ${ALERT_PAGERDUTY_ROUTING_KEY:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_EMAIL_FROM: ${ALERT_EMAIL_FROM:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_USER: ${ALERT_SMTP_USER:-}
      ALERT_SMTP_PASS: ${ALERT_SMTP_PASS:-}
    volumes:
      - ../alertmanager/alertmanager.yml:/in/alertmanager.yml:ro
      - alertmanager_config:/out
    command:
      - sh
      - -c
      - >
        apk add --no-cache gettext > /dev/null &&
        envsubst < /in/alertmanager.yml > /out/alertmanager.yml &&
        echo "Rendered alertmanager.yml" && cat /out/alertmanager.yml | head -5
    restart: "no"
    networks:
      - servix-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: servix-alertmanager
    restart: always
    volumes:
      - alertmanager_config:/etc/alertmanager:ro
      - ../alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
    expose:
      - "9093"
    ports:
      - "127.0.0.1:9093:9093"
    depends_on:
      alertmanager-config:
        condition: service_completed_successfully
    networks:
      - servix-network

  grafana:
    image: grafana/grafana:latest
    container_name: servix-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-servix2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://194.163.158.70:3100/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - prometheus
    networks:
      - servix-network

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: servix-uptime-kuma
    restart: always
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:3200:3001"
    networks:
      - servix-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: servix-node-exporter
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # Backup script writes servix_backup_*.prom files here for scraping.
      - node_exporter_textfile:/var/lib/node_exporter/textfile_collector:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/var/lib/node_exporter/textfile_collector'
    expose:
      - "9100"
    networks:
      - servix-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: servix-postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-servix_platform}?sslmode=disable
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - servix-network

  # ═══════ Redis Exporter ═══════
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: servix-redis-exporter
    restart: always
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - servix-network

  # ═══════ Nginx Exporter ═══════
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: servix-nginx-exporter
    restart: always
    command: ["-nginx.scrape-uri=http://nginx:8080/stub_status"]
    expose:
      - "9113"
    depends_on:
      - nginx
    networks:
      - servix-network

  # ═══════ n8n (workflow automation) ═══════
  n8n:
    image: n8nio/n8n:latest
    container_name: servix-n8n
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: n8n.servi-x.com
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://n8n.servi-x.com
      WEBHOOK_URL: https://n8n.servi-x.com/
      N8N_PROXY_HOPS: 1
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DEFAULT_LOCALE: ar
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: Asia/Riyadh
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
    expose:
      - "5678"
    networks:
      - servix-network
    volumes:
      - n8n_data:/home/node/.n8n

  # ═══════ Gemini API Proxy (Cloudflare Worker relay for n8n) ═══════
  gemini-proxy:
    image: node:22-alpine
    container_name: servix-gemini-proxy
    restart: always
    command: ["node", "/app/server.js"]
    volumes:
      - ./n8n-gemini-proxy/server.js:/app/server.js:ro
    expose:
      - "8080"
    networks:
      - servix-network

  # ═══════ Evolution API (WhatsApp gateway for n8n workflows) ═══════
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: servix-evolution
    restart: always
    environment:
      SERVER_URL: https://evo.servi-x.com
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution_db?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/3
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      LOG_LEVEL: WARN
      LOG_COLOR: "false"
      DEL_INSTANCE: "false"
      LANGUAGE: ar
      CONFIG_SESSION_PHONE_CLIENT: SERVIX
      CONFIG_SESSION_PHONE_NAME: Chrome
      QRCODE_LIMIT: 10
      WEBHOOK_GLOBAL_ENABLED: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - servix-network
    volumes:
      - evolution_data:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
  prometheus_data:
  alertmanager_data:
  alertmanager_config:
  node_exporter_textfile:
  grafana_data:
  uptime_kuma_data:
  uploads_data:
  vault_data:
  jaeger_data:
  evolution_data:
  n8n_data:

networks:
  servix-network:
    driver: bridge
