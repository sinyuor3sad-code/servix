apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-network-policy
  namespace: servix
spec:
  podSelector:
    matchLabels:
      app: servix-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accept traffic only from Nginx Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 4000
    # Accept traffic from other API pods (internal health checks)
    - from:
        - podSelector:
            matchLabels:
              app: servix-api
      ports:
        - port: 4000
  egress:
    # PostgreSQL / PgBouncer
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
        - port: 6432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - port: 6379
        - port: 26379  # Sentinel
    # Jaeger OTLP
    - to:
        - podSelector:
            matchLabels:
              app: jaeger
      ports:
        - port: 4318
    # DNS (required for service discovery)
    - to: []
      ports:
        - port: 53
          protocol: TCP
        - port: 53
          protocol: UDP
    # HTTPS outbound (WhatsApp, Moyasar, ZATCA, Firebase)
    - to: []
      ports:
        - port: 443
