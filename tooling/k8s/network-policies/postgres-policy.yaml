apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: servix
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Only API pods can connect to PostgreSQL via PgBouncer
    - from:
        - podSelector:
            matchLabels:
              app: servix-api
      ports:
        - port: 6432
    # Direct PG access from backup jobs only
    - from:
        - podSelector:
            matchLabels:
              app: backup-job
      ports:
        - port: 5432
