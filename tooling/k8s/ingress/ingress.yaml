apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: servix-ingress
  namespace: servix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "servix-api"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.servi-x.com
        - dashboard.servi-x.com
        - booking.servi-x.com
        - admin.servi-x.com
      secretName: servix-tls
  rules:
    - host: api.servi-x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: servix-api
                port:
                  number: 4000
    - host: dashboard.servi-x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: servix-dashboard
                port:
                  number: 3000
    - host: booking.servi-x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: servix-booking
                port:
                  number: 3000
    - host: admin.servi-x.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: servix-admin
                port:
                  number: 3000
